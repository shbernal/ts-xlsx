name: Corpus

# The regression corpus is the knowledge harvested across the rewrite, and the
# rewrite (src/) is the reference implementation validated against it. Everything
# here must stay green on every push and PR.
#
# Node 24: the rewrite runs its .ts sources directly via type-stripping (no build
# step) — see docs/decisions/0001-rewrite-runtime-and-toolchain.md. pnpm is the
# package manager; `--frozen-lockfile` fails the run if pnpm-lock.yaml is stale.

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ '**' ]

jobs:
  corpus:
    name: Rewrite gates + regression corpus
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Lint + format gate over the authored tree (Biome) — see
      # docs/decisions/0002-toolchain-standup.md.
      - run: pnpm run lint
      # Strict type-safety gate for the rewrite tree (src/). Also runs the
      # src/type-tests/ compile-time API assertions.
      - run: pnpm run typecheck
      # Strict type-safety gate for the harness tree (test/ + scripts/), held to
      # the same bar as src/: the regression corpus cases, its adapters, the corpus
      # runner, and the tooling scripts. See ADR 0011.
      - run: pnpm run typecheck:test
      # Rewrite unit tests (native node --test on .ts).
      - run: pnpm run test:src
      # Regression corpus vs the rewrite — every behavior must pass; a pass→fail is
      # a real regression.
      - run: pnpm run corpus
      # The public API reference is generated from the types; fail if the committed
      # pages have drifted from a fresh generation — see ADR-0006.
      - run: pnpm run docs:check
